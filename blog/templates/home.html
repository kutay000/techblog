{% extends 'base.html' %}

{% block content %}

<h1 class="mb-3">Tech Blog</h1>

<form method="GET" class="mb-3">
    <input type="text" name="q" placeholder="Search..." value="{{ request.GET.q }}" class="form-control mb-2">
    <button class="btn btn-dark">Search</button>
</form>

<a href="{% url 'create_post' %}" class="btn btn-success mb-3">+ New Post</a>

{% for post in page_obj %}
    <div class="card mb-3 p-3">
        <h4>
            <a href="{% url 'post_detail' post.id %}">
                {{ post.title }}
            </a>
        </h4>
        <p>{{ post.content|truncatewords:15 }}</p>
    </div>
{% endfor %}

{% endblock %}
